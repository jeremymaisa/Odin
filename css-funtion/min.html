<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIN - FUNCION</title>
    <style>
      #container {
        display: flex;
        box-sizing: border-box;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border: 6px solid black;
        resize: both;
        overflow: auto;
        max-width: 100%;
        max-height: 100%;
      }

      img#iconHolder {
        width: min(150px, 100%);
        height: min(150px, 100%);
        box-sizing: border-box;
        border: 6px solid blue;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <img src="/img/lizard.png" alt="lizard" id="iconHolder" />
    </div>
  </body>
</html>
