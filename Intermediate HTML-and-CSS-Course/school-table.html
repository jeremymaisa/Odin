<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Tables</title>
    <style>
      html {
        font-family: sans-serif;
      }

      body {
        margin: 0 20px;
      }

      table {
        border-collapse: collapse;
        border: 2px solid rgb(200, 200, 200);
        letter-spacing: 1px;
        font-size: 0.8rem;
      }

      td {
        text-align: center;
      }

      td,
      th {
        border: 2px solid rgb(222, 208, 208);
        padding: 10px 20px;
      }

      .column-background {
        background-color: #97db9a;
      }

      .column-fixed-width {
        width: 40px;
      }

      .column-background-border {
        background-color: #dcc48e;
        border: 4px solid #c1437a;
      }
    </style>
  </head>
  <body>
    <table>
      <caption>
        School language timetable
      </caption>
      <colgroup>
        <col span="2" />
        <col class="column-background" />
        <col class="column-fixed-width" />
        <col class="column-background" />
        <col class="column-background-border" />
        <col span="2" class="column-fixed-width" />
      </colgroup>
      <tr>
        <td>&nbsp;</td>
        <th>Mon</th>
        <th>Tues</th>
        <th>Web</th>
        <th>Thurs</th>
        <th>Fri</th>
        <th>Sat</th>
        <th>Sun</th>
      </tr>
      <tr>
        <th>1st period</th>
        <td>English</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
        <td>German</td>
        <td>Dutch</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
      </tr>
      <tr>
        <th>2nd period</th>
        <td>English</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
        <td>German</td>
        <td>Dutch</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
      </tr>
      <tr>
        <th>3rd period</th>
        <td>&nbsp;</td>
        <td>German</td>
        <td>&nbsp;</td>
        <td>German</td>
        <td>Dutch</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
      </tr>
      <tr>
        <th>4th period</th>
        <td>&nbsp;</td>
        <td>English</td>
        <td>&nbsp;</td>
        <td>English</td>
        <td>Dutch</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
      </tr>
    </table>
  </body>
</html>
