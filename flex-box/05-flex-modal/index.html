<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/flex-box/05-flex-modal/style.css" />
    <title>flex modal</title>
  </head>
  <body>
    <div class="modal">
      <span class="warning">!</span>
      <div class="container">
        <div class="header">
          Are you sure you want to do that?
          <button class="close">x</button>
        </div>
        <div class="message">
          <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Eveniet aut,
            eligendi quibusdam dolorum repellendus commodi rerum inventore quo
            ducimus tempore magni, rem iure perspiciatis nulla magnam nam fugiat
            quia excepturi.
          </p>
        </div>
        <button class="continue">Continue</button>
        <button class="cancel">Cancel</button>
      </div>
    </div>
  </body>
</html>
