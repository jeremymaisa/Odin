<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up Form</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
      }

      .background {
        background-image: url("/forms/image.png");
      }

      .container {
        display: flex;
        justify-content: center;
        height: 100vh;
      }

      .form {
        flex: 1;
        padding: 30px;
        background-color: #f9fafb;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .row {
        display: flex;
        gap: 20px;
        margin-bottom: 15px;
      }

      .input-container {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .text {
        font-size: 18px;
        margin-bottom: 20px;
      }

      h1 {
        margin-bottom: 20px;
      }

      h2 + h2 {
        font-size: 16px;
        font-style: italic;
        margin-bottom: 15px;
      }

      label {
        font-size: 12px;
        font-weight: bold;
        letter-spacing: 1;
        margin-bottom: 5px;
      }

      input {
        padding: 8px 20px;
        border: 1px solid #808080;
        border-radius: 5px;
        outline: none;
      }

      input:focus {
        border: 1px solid rgb(118, 118, 228);
      }

      #password:user-invalid,
      #cpassword:user-invalid {
        border: 1px solid #ff0000;
      }

      #password:user-valid,
      #cpassword:user-valid {
        border: 1px solid #008000;
      }

      #message {
        font-size: 12px;
      }

      #submit {
        padding: 10px 40px;
        font-size: 16px;
        font-weight: bold;
        background-color: #596d48;
        color: #ffffff;
        border-radius: 8px;
        border: none;
        outline: none;
        cursor: pointer;
        margin-bottom: 20px;
      }

      a {
        color: #596d48;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="background">
        <img src="/forms/image.png" alt="" />
      </div>
      <div class="form">
        <div class="form-heading">
          <h2 class="text">
            This is not a real online services! You know you need something like
            this in you life to help you realize your deepest dreams. Sign up
            now to get started.
          </h2>
          <h2>You know you want to.</h2>
        </div>
        <form id="main-form">
          <h1>Let's do this!</h1>
          <div class="row">
            <div class="input-container">
              <label for="fname">FIRST NAME</label>
              <input type="text" name="fname" id="fname" />
            </div>
            <div class="input-container">
              <label for="lname">LAST NAME</label>
              <input type="text" name="lname" id="lname" />
            </div>
          </div>
          <div class="row">
            <div class="input-container">
              <label for="email">EMAIL</label>
              <input type="email" name="email" id="email" />
            </div>
            <div class="input-container">
              <label for="phone">PHONE NUMBER</label>
              <input type="number" name="phone" id="phone" />
            </div>
          </div>
          <div class="row">
            <div class="input-container">
              <label for="password">PASSWORD</label>
              <input type="password" name="password" id="password" />
              <p id="message"></p>
            </div>
            <div class="input-container">
              <label for="cpassword">CONFIRM PASSWORD</label>
              <input type="password" name="cpassword" id="cpassword" />
            </div>
          </div>
          <button type="submit" id="submit">Create Account</button>
          <p>Already have an account? <a href="#">Login</a></p>
        </form>
      </div>
    </div>

    <script>
      document.getElementById("main-form").addEventListener("submit", (e) => {
        e.preventDefault();

        const passwordInput = document.getElementById("password");
        const confirmPasswordInput = document.getElementById("cpassword");
        const message = document.getElementById("message");

        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        passwordInput.style.border = "";
        confirmPasswordInput.style.border = "";

        if (password === "" && confirmPassword === "") {
          message.textContent = "Please enter your password.";
          message.style.color = "red";

          passwordInput.style.border = "1px solid red";
          confirmPasswordInput.style.border = "1px solid red";
        } else if (password !== confirmPassword) {
          message.textContent = "Password do not match!";
          message.style.color = "red";

          passwordInput.style.border = "1px solid red";
          confirmPasswordInput.style.border = "1px solid red";
        } else if (password.length < 6) {
          message.textContent = "Password must be at least 6 characters";
          message.style.color = "red";

          passwordInput.style.border = "1px solid red";
          confirmPasswordInput.style.border = "1px solid red";
        } else {
          message.textContent = "Password matched!";
          message.style.color = "green";

          passwordInput.style.border = "1px solid green";
          confirmPasswordInput.style.border = "1px solid green";
        }
      });
    </script>
  </body>
</html>
