<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Links Pages</title>
  </head>
  <body>
    <h1>LINKS PAGES</h1>
    <p>This example is about links and <a href="images.html">Images</a></p>

    <p>This particular page is about links! There are three kinds of links:</p>

    <ul>
      <!-- Absolute links is going to another web -->
      <li>
        <a
          href="https://developer.mozilla.org/en-US/docs/Web/HTML"
          target="_blank"
          rel="noopener"
          title="HTML Documentation from mozilla"
          >Mozilla Developer Network</a
        >
      </li>
      <!-- Relative links is linking to your own web -->
      <li>
        <a
          href="misc/extra.html"
          target="_blank"
          rel="nooperner"
          title="Extra pages"
          >extras pages</a
        >
      </li>
    </ul>
  </body>
</html>
